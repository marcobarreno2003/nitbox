name: Seed Squads

# Runs every Monday at 4:00 AM UTC.
# Refreshes player rosters and coach data for all 60 teams.
# Weekly cadence because squads rarely change mid-week; transfers and
# call-ups are typically announced around international windows.

on:
  schedule:
    - cron: '0 4 * * 1'   # 04:00 UTC every Monday
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  seed-squads:
    name: Refresh player rosters + coaches
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed players
        working-directory: apps/api
        run: npm run seed:players
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY:   ${{ secrets.API_FOOTBALL_KEY }}

      - name: Seed coaches
        working-directory: apps/api
        run: npm run seed:coaches
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY:   ${{ secrets.API_FOOTBALL_KEY }}
