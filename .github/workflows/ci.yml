name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Check — runs on every PR and push
  # ---------------------------------------------------------------------------
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:      postgresql://postgres:postgres@localhost:5432/nitbox
      API_FOOTBALL_KEY:  placeholder
      PAYLOAD_SECRET:    placeholder_secret_32_chars_minimum

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Typecheck
        run: npm run typecheck

      - name: Build web (static export)
        run: npm run build --workspace=apps/web
