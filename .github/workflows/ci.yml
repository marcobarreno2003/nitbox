name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Check — runs on every PR and push
  # ---------------------------------------------------------------------------
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL:      postgresql://postgres:postgres@localhost:5432/nitbox
      API_FOOTBALL_KEY:  placeholder
      PAYLOAD_SECRET:    placeholder_secret_32_chars_minimum

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Deploy — only on push to main, after check passes
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key:      ${{ secrets.SERVER_SSH_KEY }}
          port:     ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd /opt/nitbox
            git pull origin main
            docker compose --env-file .env.production up --build -d --remove-orphans
            docker image prune -f
            echo "Deploy complete: $(date)"
