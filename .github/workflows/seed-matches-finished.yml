name: Seed Matches Finished

# Runs daily at 2:00 AM UTC — before seed-calendar (3am) and seed-predictions (4am).
# Enriches all FT/AET/PEN matches not yet at FULLY_ENRICHED status.
# Progress is saved on API daily limit — re-runs pick up where they left off.
# This is the most critical workflow for ML feature completeness.

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  seed-matches-finished:
    if: false  # Disabled — NITBox is now a static portfolio site
    name: Enrich finished matches
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run seed:matches-finished
        working-directory: apps/api
        run: npm run seed:matches-finished
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY:   ${{ secrets.API_FOOTBALL_KEY }}
