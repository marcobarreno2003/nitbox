upstream nitbox_api {
    # Round-robin across all running api containers
    # When scaled (docker compose up --scale api=3), nginx distributes load automatically
    server api:3001;
}

server {
    listen 80;
    server_name _;

    # Health check endpoint (used by Cloudflare Tunnel)
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # API
    location /api/ {
        proxy_pass         http://nitbox_api;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        # Buffer
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 16k;
    }

    # Block anything else
    location / {
        return 404;
    }
}
